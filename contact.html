<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GuitarLab - Contact</title>
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="contact-page">
    <header style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('img/red.png') no-repeat center center; background-size: cover; color: white; padding: 60px 0;">
        <div class="warp">
            <div class="logo">
                <h1>Welcome to GuitarLab</h1>
                <img src="img/white_on_trans.png" alt="GuitarLab Logo" />
            </div>
            <nav class="text">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="songs.html">Songs</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>       
        <div id="main-content-contact">
            <h1 id="myH1">Contact Us</h1>
            <p>Please fill in the form below to get in touch with us</p>

            <form>
            <div class="form-group">
            <input type="text" id="username" placeholder="Enter username">
            </div>

            <div class="form-group">
            <input type="email" id="email" placeholder="Email">
            </div>

            <div class="form-group">
            <input type="tel" id="phone" placeholder="Phone Number">
            </div>

            <div class="form-group">
            <input type="number" id="age" placeholder="Your Age" min="0" max="120" step="1">
            </div>   

            <div class="form-group">
            <textarea id="message" rows="4" cols="30" placeholder="Write your message here..."></textarea>
            </div>

            <div class="form-group">
            <button type="button" id = "signUp">Submit</button>
            </div>

            </form>

        </div>
    <script src="script.js"></script>

    <footer id="main-footer-contact">
        <div class="links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="songs.html">Songs</a>
            <a href="contact.html">Contact</a>
        </div>

        <div class="socials">
            <div class="social-item">
                <img src="img/instagram.png" alt="Instagram Logo" class="social-logo">
                <span>@GuitarLab</span>
            </div>
            <div class="social-item">
                <img src="img/facebook.png" alt="Facebook Logo" class="social-logo">
                <span>GuitarLab</span>
            </div>
            <div class="social-item">
                <img src="img/tiktok.png" alt="TikTok Logo" class="social-logo">
                <span>@GuitarLab</span>
            </div>
        </div>

        <div class="tagline">
            🎸 Rock Bottom | © 2025 GuitarLab
        </div>
        <div class="logo">
            <img src="img/logo.png" alt="Logo">
        </div>
    </footer>
</body>
</html>
